<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠goHOMEs FInder – Accommodation AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory:    #F7F3EC;
    --warm:     #EDE8DF;
    --sand:     #D9C9B0;
    --terra:    #C26A3A;
    --rust:     #A84E2A;
    --ink:      #1C1A17;
    --ink2:     #2E2B26;
    --muted:    #8A7D6E;
    --surface:  #FFFFFF;
    --border:   rgba(28,26,23,0.1);
    --shadow:   rgba(28,26,23,0.12);
    --green:    #25D366;
    --radius:   20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--ivory);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow-x: hidden;
  }

  /* Organic background shapes */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.5;
  }
  .bg-blob-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #C26A3A22, transparent);
    top: -150px; right: -100px;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .bg-blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #D9C9B022, transparent);
    bottom: -100px; left: -80px;
    animation: drift 10s ease-in-out 2s infinite alternate;
  }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(20px, -20px) scale(1.05); }
  }

  /* Decorative grid lines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(194,106,58,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(194,106,58,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    padding: 0 2px;
    position: relative;
    z-index: 1;
  }
  .logo {
    width: 50px; height: 50px;
    background: var(--terra);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    box-shadow: 0 6px 24px rgba(194,106,58,0.35);
    position: relative;
  }
  .logo::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 18px;
    border: 1.5px solid rgba(194,106,58,0.3);
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .header-text h1 span { color: var(--terra); }
  .header-text p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #E8F5E9;
    color: #2E7D32;
    border-radius: 100px;
    padding: 3px 10px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: #4CAF50;
    border-radius: 50%;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Chat window */
  .chat-window {
    width: 100%;
    max-width: 500px;
    background: var(--surface);
    border-radius: 28px;
    border: 1px solid var(--border);
    box-shadow:
      0 2px 0 rgba(255,255,255,0.8) inset,
      0 32px 80px var(--shadow),
      0 2px 8px rgba(28,26,23,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 74vh;
    max-height: 640px;
    position: relative;
    z-index: 1;
  }

  /* Top bar */
  .chat-topbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--ivory);
  }
  .chat-topbar-left {
    display: flex; align-items: center; gap: 10px;
  }
  .agent-avatar {
    width: 36px; height: 36px;
    background: var(--terra);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .agent-info strong {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--ink);
  }
  .agent-info span {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .progress-bar-wrap {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
  }
  .mini-progress {
    width: 80px; height: 4px;
    background: var(--warm);
    border-radius: 10px;
    margin-top: 4px;
    overflow: hidden;
  }
  .mini-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--terra), #E08B5A);
    border-radius: 10px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }

  /* Bubbles */
  .msg { display: flex; align-items: flex-end; gap: 9px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .msg.bot { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }

  .bot-icon {
    width: 34px; height: 34px;
    background: var(--terra);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(194,106,58,0.3);
  }

  .bubble {
    max-width: 78%;
    padding: 13px 17px;
    font-size: 0.875rem;
    line-height: 1.6;
    border-radius: 20px;
  }
  .msg.bot .bubble {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
    color: var(--ink);
    box-shadow: 0 2px 8px var(--shadow);
  }
  .msg.user .bubble {
    background: var(--terra);
    border-bottom-right-radius: 6px;
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 14px rgba(194,106,58,0.3);
  }

  /* Chips */
  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 18px 14px;
  }
  .chip {
    background: var(--ivory);
    border: 1.5px solid var(--sand);
    color: var(--ink2);
    border-radius: 100px;
    padding: 7px 15px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }
  .chip:hover {
    background: var(--terra);
    border-color: var(--terra);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(194,106,58,0.3);
  }

  /* Input area */
  .input-area {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 13px 16px;
    border-top: 1px solid var(--border);
    background: var(--ivory);
  }
  #userInput {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 11px 16px;
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 6px rgba(28,26,23,0.05);
  }
  #userInput:focus {
    border-color: var(--terra);
    box-shadow: 0 0 0 3px rgba(194,106,58,0.1);
  }
  #userInput::placeholder { color: var(--muted); }

  .send-btn {
    width: 46px; height: 46px;
    background: var(--terra);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(194,106,58,0.35);
  }
  .send-btn:hover { transform: scale(1.06); background: var(--rust); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Typing */
  .typing { display: flex; align-items: center; gap: 5px; padding: 4px 2px; }
  .dot { width: 7px; height: 7px; background: var(--sand); border-radius: 50%; animation: bounce 1.3s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }

  /* Inline form */
  .inline-input { display: flex; flex-direction: column; gap: 9px; margin-top: 10px; }

  .inline-field {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 10px 14px;
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-size: 0.84rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .inline-field:focus { border-color: var(--terra); }
  .inline-field::placeholder { color: var(--muted); }
  select.inline-field { cursor: pointer; background-color: var(--surface); }
  select.inline-field option { background: white; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .submit-inline {
    background: var(--terra);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.87rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .submit-inline:hover { background: var(--rust); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(194,106,58,0.35); }

  /* Order summary card */
  .order-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-top: 10px;
    font-size: 0.82rem;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .oc-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--terra);
    margin-bottom: 11px;
    font-size: 0.92rem;
  }
  .oc-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 7px 0;
    border-bottom: 1px dashed var(--border);
    gap: 12px;
  }
  .oc-row:last-child { border: none; padding-bottom: 0; }
  .oc-row .key { color: var(--muted); font-weight: 400; flex-shrink: 0; }
  .oc-row .val { color: var(--ink); font-weight: 600; text-align: right; }

  /* WhatsApp button */
  .wa-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 13px;
    padding: 14px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 11px;
    width: 100%;
    justify-content: center;
    transition: all 0.2s;
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(37,211,102,0.3);
    letter-spacing: 0.01em;
  }
  .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,0.4); }
  .wa-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

  /* Feature badge strip */
  .badge-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .badge {
    background: rgba(194,106,58,0.1);
    color: var(--terra);
    border-radius: 100px;
    padding: 4px 11px;
    font-size: 0.72rem;
    font-weight: 600;
    border: 1px solid rgba(194,106,58,0.2);
  }

  /* Footer */
  .footer {
    margin-top: 10px;
    font-size: 0.71rem;
    color: var(--muted);
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .footer span { color: var(--terra); font-weight: 500; }

  /* Error flash */
  .err { color: #C62828; font-size: 0.76rem; margin-top: 4px; }

  /* Property type grid */
  .prop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-top: 8px;
  }
  .prop-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .prop-card:hover {
    border-color: var(--terra);
    background: rgba(194,106,58,0.06);
    color: var(--terra);
    transform: translateY(-2px);
  }
  .prop-card .prop-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<div class="header">
  <div class="logo">🏡</div>
  <div class="header-text">
    <h1>Nest<span>Finder</span></h1>
    <p>Accommodation AI Agent</p>
    <div class="status-pill"><span class="status-dot"></span> Agent Online</div>
  </div>
</div>

<div class="chat-window">
  <!-- Top bar -->
  <div class="chat-topbar">
    <div class="chat-topbar-left">
      <div class="agent-avatar">🏡</div>
      <div class="agent-info">
        <strong>Nest Agent</strong>
        <span>Finding your perfect space</span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <span id="progressLabel">Step 0 of 6</span>
      <div class="mini-progress"><div class="mini-progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="chips" id="chips"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your response…" autocomplete="off" />
    <button class="send-btn" onclick="handleSend()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="footer">Powered by <span>NestFinder AI</span> · Inquiries sent via WhatsApp</div>

<script>
const WHATSAPP_NUMBER = "2348157505037";
const STEPS_TOTAL = 6;

// ─── State ─────────────────────────────────────────────────────────────────
const state = {
  step: "welcome",
  searchType:    "",   // looking | listing
  propertyType:  "",   // Apartment | Self-con | Room | Duplex | Flat | Office | Shortlet
  location:      "",
  budget:        "",
  duration:      "",   // Monthly | Yearly | Weekly | Nightly
  bedrooms:      "",
  amenities:     [],
  name:          "",
  phone:         "",
  moveInDate:    "",
  extraNote:     "",
};

const STEPS = ["welcome","search_type","property_type","location_budget","duration","contact_info"];

function getStepIndex() {
  return STEPS.indexOf(state.step);
}

function updateProgress() {
  const idx = Math.max(getStepIndex(), 0);
  const pct = Math.round((idx / (STEPS_TOTAL - 1)) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `Step ${idx} of ${STEPS_TOTAL - 1}`;
}

// ─── DOM helpers ────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const chipsEl    = document.getElementById("chips");
const inputEl    = document.getElementById("userInput");

function scrollBottom() {
  setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 80);
}

function addMessage(who, html) {
  const wrap = document.createElement("div");
  wrap.className = `msg ${who}`;
  if (who === "bot") {
    wrap.innerHTML = `<div class="bot-icon">🏡</div><div class="bubble">${html}</div>`;
  } else {
    wrap.innerHTML = `<div class="bubble">${html}</div>`;
  }
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement("div");
  wrap.className = "msg bot"; wrap.id = "typing";
  wrap.innerHTML = `<div class="bot-icon">🏡</div><div class="bubble"><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
  messagesEl.appendChild(wrap);
  scrollBottom();
}
function removeTyping() { document.getElementById("typing")?.remove(); }

function setChips(chips) {
  chipsEl.innerHTML = "";
  chips.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "chip"; btn.textContent = c;
    btn.onclick = () => processInput(c);
    chipsEl.appendChild(btn);
  });
}

function botReply(html, chips = [], delay = 950) {
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMessage("bot", html);
    setChips(chips);
    updateProgress();
  }, delay);
}

// ─── Flow ───────────────────────────────────────────────────────────────────
function handleStep(input) {
  const v = input.toLowerCase().trim();

  switch(state.step) {

    case "welcome":
      if (v.includes("find") || v.includes("looking") || v.includes("rent") || v.includes("search")) {
        state.searchType = "Looking for accommodation";
        state.step = "property_type";
        botReply(
          `Great! I'll help you find the perfect place. 🔍<br><br>What type of property are you looking for?`,
          [], 900
        );
        setTimeout(() => renderPropertyGrid(), 1050);
        return;
      }
      if (v.includes("list") || v.includes("advertise") || v.includes("post") || v.includes("landlord") || v.includes("agent")) {
        state.searchType = "Listing a property";
        state.step = "property_type";
        botReply(
          `Excellent! Let's get your property listed. 🏷️<br><br>What type of property are you listing?`,
          [], 900
        );
        setTimeout(() => renderPropertyGrid(), 1050);
        return;
      }
      return false;

    case "property_type":
      state.propertyType = input;
      state.step = "location_budget";
      botReply(
        `Nice choice! 👌 A <strong>${input}</strong> it is.<br><br>Now tell me — <strong>where</strong> are you looking? (city, area, or landmark)<br>And what's your <strong>budget range</strong>? (e.g. ₦50,000/month or ₦500,000/year)`,
        []
      );
      return;

    case "location_budget":
      state.location = input;
      state.step = "duration";
      botReply(
        `Got it — <strong>${input}</strong>. ✅<br><br>How long do you plan to stay, or what rental duration are you looking for?`,
        ["Monthly", "Yearly", "Weekly (Shortlet)", "Nightly (Shortlet)"]
      );
      return;

    case "duration":
      state.duration = input.replace(" (Shortlet)","");
      state.step = "bedrooms";
      botReply(
        `${state.duration} — noted! 📝<br><br>How many <strong>bedrooms</strong> do you need?`,
        ["Self-contained (Studio)", "1 Bedroom", "2 Bedrooms", "3 Bedrooms", "4+ Bedrooms", "Not Applicable"]
      );
      return;

    case "bedrooms":
      state.bedrooms = input;
      state.step = "contact_info";
      botReply(
        `Perfect! 🎯 Last step — please fill in your contact details so our agent can reach you with the best options right away.`,
        []
      );
      setTimeout(() => renderContactForm(), 1050);
      return;

    default:
      return false;
  }
}

// ─── Property type grid ──────────────────────────────────────────────────────
function renderPropertyGrid() {
  const types = [
    { icon: "🏢", label: "Apartment" },
    { icon: "🏠", label: "Self-con / Studio" },
    { icon: "🛏️", label: "Single Room" },
    { icon: "🏡", label: "Duplex / Bungalow" },
    { icon: "🏗️", label: "Flat" },
    { icon: "🏨", label: "Shortlet" },
    { icon: "🏬", label: "Office Space" },
    { icon: "🏰", label: "Mansion / Estate" },
  ];

  const wrap = document.createElement("div");
  wrap.className = "msg bot";

  const gridHtml = types.map(t =>
    `<div class="prop-card" onclick="selectPropertyType('${t.label}')">
      <span class="prop-icon">${t.icon}</span>${t.label}
    </div>`
  ).join("");

  wrap.innerHTML = `<div class="bot-icon">🏡</div>
    <div class="bubble" style="max-width:90%">
      <div class="prop-grid">${gridHtml}</div>
    </div>`;
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function selectPropertyType(label) {
  addMessage("user", label);
  handleStep(label);
}

// ─── Contact form ─────────────────────────────────────────────────────────
function renderContactForm() {
  const isListing = state.searchType.includes("Listing");
  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.innerHTML = `
    <div class="bot-icon">🏡</div>
    <div class="bubble" style="max-width:92%">
      <p>Fill in your details and we'll connect you with our housing agent on WhatsApp. ✨</p>
      <div class="inline-input" id="contactForm">
        <input class="inline-field" id="f_name"  placeholder="Your full name" type="text"/>
        <input class="inline-field" id="f_phone" placeholder="Phone number (e.g. 08012345678)" type="tel"/>
        ${!isListing ? `<input class="inline-field" id="f_movein" placeholder="Preferred move-in date (e.g. April 2025)" type="text"/>` : ``}
        <input class="inline-field" id="f_note" placeholder="Any specific requirements or questions? (optional)"/>
        <button class="submit-inline" onclick="submitInquiry()">
          🔍 ${isListing ? "Submit My Listing" : "Find My Accommodation"}
        </button>
      </div>
    </div>`;
  messagesEl.appendChild(wrap);
  scrollBottom();
}

// ─── Submit & WhatsApp redirect ──────────────────────────────────────────────
function submitInquiry() {
  const name   = document.getElementById("f_name")?.value.trim();
  const phone  = document.getElementById("f_phone")?.value.trim();
  const movein = document.getElementById("f_movein")?.value.trim() || "Flexible";
  const note   = document.getElementById("f_note")?.value.trim() || "None";

  if (!name || !phone) { flashErr("Please enter your name and phone number."); return; }
  if (phone.length < 7) { flashErr("Please enter a valid phone number."); return; }

  state.name = name; state.phone = phone; state.moveInDate = movein; state.extraNote = note;
  document.getElementById("contactForm").style.display = "none";
  addMessage("user", `${name} · ${phone}`);

  showTyping();
  setTimeout(() => { removeTyping(); showSummary(); }, 1200);
}

function flashErr(msg) {
  document.getElementById("err_f")?.remove();
  const el = document.createElement("div");
  el.id = "err_f"; el.className = "err"; el.textContent = "⚠ " + msg;
  document.getElementById("contactForm")?.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showSummary() {
  const isListing = state.searchType.includes("Listing");
  const { propertyType, location, duration, bedrooms, name, phone, moveInDate, extraNote, searchType } = state;

  const waLines = [
    `🏡 *${isListing ? "NEW PROPERTY LISTING" : "ACCOMMODATION REQUEST"} – NestFinder*`,
    ``,
    `*Request Type:* ${searchType}`,
    `*Property Type:* ${propertyType}`,
    `*Location / Area:* ${location}`,
    `*Rental Duration:* ${duration}`,
    `*Bedrooms:* ${bedrooms}`,
    !isListing ? `*Move-in Date:* ${moveInDate}` : null,
    ``,
    `*Contact Name:* ${name}`,
    `*Phone:* ${phone}`,
    `*Extra Notes:* ${extraNote}`,
    ``,
    `Sent via NestFinder AI Agent 🏡`
  ].filter(Boolean).join("\n");

  const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waLines)}`;

  const summaryRows = [
    ["Type", searchType],
    ["Property", propertyType],
    ["Location", location],
    ["Duration", duration],
    ["Bedrooms", bedrooms],
    !isListing ? ["Move-in", moveInDate] : null,
    ["Name", name],
    ["Phone", phone],
    ["Notes", extraNote || "—"],
  ].filter(Boolean);

  const rowsHtml = summaryRows.map(([k,v]) =>
    `<div class="oc-row"><span class="key">${k}</span><span class="val">${v}</span></div>`
  ).join("");

  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.innerHTML = `
    <div class="bot-icon">🏡</div>
    <div class="bubble" style="max-width:92%">
      <p>Your ${isListing ? "listing" : "request"} is ready! 🎉 Our housing agent will reach out to you shortly with the best available options.</p>
      <div class="order-card">
        <div class="oc-title">📋 ${isListing ? "Listing" : "Search"} Summary</div>
        ${rowsHtml}
      </div>
      <a class="wa-btn" href="${waUrl}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Send Inquiry via WhatsApp
      </a>
      <div class="badge-strip">
        <span class="badge">✓ Verified Listings</span>
        <span class="badge">⚡ Fast Response</span>
        <span class="badge">🔒 Safe & Trusted</span>
      </div>
    </div>`;
  messagesEl.appendChild(wrap);
  scrollBottom();
  setChips(["🔄 New Search", "📋 List a Property", "❓ Help"]);
  updateProgress();
}

// ─── Core input handler ──────────────────────────────────────────────────────
function processInput(raw) {
  if (!raw.trim()) return;
  const v = raw.toLowerCase();
  chipsEl.innerHTML = "";

  if (v.includes("new search") || v.includes("new order") || v.includes("start over")) { resetChat(); return; }
  if (v.includes("list a property") || v.includes("landlord")) {
    addMessage("user", raw);
    state.searchType = "Listing a property";
    state.step = "property_type";
    botReply(`Let's get your property listed! 🏷️<br><br>What type of property are you listing?`, [], 800);
    setTimeout(() => renderPropertyGrid(), 1000);
    return;
  }
  if (v.includes("help")) {
    addMessage("user", raw);
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage("bot", `Need help? Our agents are standing by! 😊<br><br>📞 <strong>+234 815 750 5037</strong><br>💬 WhatsApp: <strong>+234 815 750 5037</strong><br><br>We handle <strong>rentals, shortlets, sales & property listings</strong> across Nigeria.<br><br>Type <em>New Search</em> to start fresh.`);
      setChips(["🔄 New Search", "📋 List a Property"]);
    }, 800);
    return;
  }

  addMessage("user", raw);
  const handled = handleStep(raw);
  if (handled === false) {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage("bot", "I didn't quite catch that. Please choose one of the options or type your answer 😊");
      const cur = STEPS[getStepIndex()];
      if (cur === "welcome") setChips(["🔍 Find Accommodation", "📋 List a Property"]);
    }, 700);
  }
}

function handleSend() {
  const val = inputEl.value.trim();
  if (!val) return;
  inputEl.value = "";
  processInput(val);
}

inputEl.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });

// ─── Init ────────────────────────────────────────────────────────────────────
function resetChat() {
  Object.assign(state, {
    step:"welcome", searchType:"", propertyType:"", location:"", budget:"",
    duration:"", bedrooms:"", amenities:[], name:"", phone:"", moveInDate:"", extraNote:""
  });
  messagesEl.innerHTML = "";
  chipsEl.innerHTML = "";
  initChat();
}

function initChat() {
  updateProgress();
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMessage("bot",
      `Welcome to <strong>NestFinder</strong>! 🏡✨<br><br>I'm your personal accommodation AI agent. Whether you're <strong>searching for a place to rent</strong> or looking to <strong>list your property</strong>, I've got you covered across Nigeria.<br><br>What would you like to do today?`
    );
    setChips(["🔍 Find Accommodation", "📋 List a Property", "❓ Help"]);
  }, 900);
}

initChat();
</script>
</body>
</html>
