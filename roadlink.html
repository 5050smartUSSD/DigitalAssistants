<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚌goMETRO – Interstate Bus Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;0,900;1,700&family=Epilogue:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0C1520;
    --surface:  #111E2E;
    --card:     #162235;
    --panel:    #1C2D42;
    --border:   rgba(245,158,11,0.15);
    --border2:  rgba(255,255,255,0.05);
    --amber:    #F59E0B;
    --gold:     #FBBF24;
    --sky:      #38BDF8;
    --sky2:     #0EA5E9;
    --emerald:  #10B981;
    --rose:     #F43F5E;
    --text:     #E8EFF8;
    --muted:    #566780;
    --green:    #25D366;
    --radius:   18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Epilogue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
    position: relative; overflow-x: hidden;
  }

  /* Road perspective background */
  .road-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .road-bg::before {
    content: '';
    position: absolute;
    bottom: -20%; left: 50%; transform: translateX(-50%);
    width: 260px; height: 120%;
    background: linear-gradient(to top,
      rgba(245,158,11,0.06) 0%,
      rgba(245,158,11,0.02) 40%,
      transparent 80%
    );
    clip-path: polygon(30% 100%, 70% 100%, 100% 0%, 0% 0%);
  }
  /* Dashed road lines */
  .road-bg::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 4px; height: 100%;
    background: repeating-linear-gradient(
      to top,
      rgba(245,158,11,0.15) 0px, rgba(245,158,11,0.15) 20px,
      transparent 20px, transparent 40px
    );
    animation: road-scroll 1.5s linear infinite;
  }
  @keyframes road-scroll {
    from { background-position: 0 0; }
    to   { background-position: 0 40px; }
  }

  /* Ambient glow */
  .glow {
    position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none;
  }
  .glow-1 { width: 500px; height: 300px; background: rgba(245,158,11,0.06); top: -80px; left: -100px; animation: drift 10s ease-in-out infinite alternate; }
  .glow-2 { width: 400px; height: 400px; background: rgba(56,189,248,0.04); bottom: -100px; right: -80px; animation: drift 12s ease-in-out 2s infinite alternate; }
  @keyframes drift { from{transform:translate(0,0)} to{transform:translate(20px,-20px)} }

  /* ── HEADER ── */
  .header {
    width: 100%; max-width: 520px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 12px;
    position: relative; z-index: 2;
  }
  .logo {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--amber), var(--gold));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
    box-shadow: 0 6px 28px rgba(245,158,11,0.45);
    animation: logo-pulse 3s ease-in-out infinite alternate;
  }
  @keyframes logo-pulse {
    from { box-shadow: 0 6px 20px rgba(245,158,11,0.35); }
    to   { box-shadow: 0 8px 36px rgba(245,158,11,0.6); }
  }
  .header-text h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem; font-weight: 900;
    color: var(--text); letter-spacing: -0.02em; line-height: 1;
  }
  .header-text h1 span { color: var(--amber); }
  .header-text p { font-size: 0.72rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.03em; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.25);
    color: var(--amber); border-radius: 100px;
    padding: 3px 10px; font-size: 0.68rem; font-weight: 600;
    margin-top: 5px; letter-spacing: 0.04em;
  }
  .status-dot { width: 6px; height: 6px; background: var(--amber); border-radius: 50%; animation: blink 1.6s infinite; box-shadow: 0 0 6px var(--amber); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── CHAT WINDOW ── */
  .chat-window {
    width: 100%; max-width: 520px;
    background: var(--surface);
    border-radius: 26px;
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(245,158,11,0.05), 0 40px 100px rgba(0,0,0,0.6);
    overflow: hidden; display: flex; flex-direction: column;
    height: 76vh; max-height: 660px;
    position: relative; z-index: 2;
  }

  /* Topbar */
  .topbar {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
  }
  .topbar::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.4;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .agent-av {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(251,191,36,0.1));
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .agent-info strong { display: block; font-size: 0.82rem; color: var(--amber); font-weight: 700; }
  .agent-info span { font-size: 0.68rem; color: var(--muted); }

  /* Progress steps */
  .step-dots { display: flex; align-items: center; gap: 5px; }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--border2);
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.5); border-color: var(--amber); }
  .step-dot.done   { background: var(--emerald); border-color: var(--emerald); }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 15px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); border-radius: 4px; }

  .msg { display: flex; align-items: flex-end; gap: 9px; animation: up 0.3s ease; }
  @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot  { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }

  .bot-icon {
    width: 34px; height: 34px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(251,191,36,0.1));
    border: 1px solid rgba(245,158,11,0.3); border-radius: 11px;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
    box-shadow: 0 0 12px rgba(245,158,11,0.15);
  }

  .bubble {
    max-width: 80%; padding: 13px 16px;
    font-size: 0.875rem; line-height: 1.65; border-radius: 18px;
  }
  .msg.bot .bubble {
    background: var(--card); border: 1px solid var(--border);
    border-bottom-left-radius: 5px; color: var(--text);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(251,191,36,0.12));
    border: 1px solid rgba(245,158,11,0.35);
    border-bottom-right-radius: 5px;
    color: var(--gold); font-weight: 600; font-size: 0.84rem;
  }
  .bubble strong { color: var(--gold); }
  .bubble .hl { color: var(--sky); }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; padding: 0 16px 12px; }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 100px;
    padding: 7px 15px; font-size: 0.77rem; cursor: pointer;
    font-family: 'Epilogue', sans-serif; font-weight: 500; transition: all 0.2s;
  }
  .chip:hover {
    background: rgba(245,158,11,0.1); border-color: var(--amber);
    color: var(--amber); transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(245,158,11,0.15);
  }

  /* Input */
  .input-area {
    display: flex; align-items: center; gap: 9px;
    padding: 12px 15px; border-top: 1px solid var(--border);
    background: var(--card); position: relative;
  }
  .input-area::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,158,11,0.3), transparent);
  }
  #userInput {
    flex: 1; background: var(--panel);
    border: 1px solid var(--border); border-radius: 13px;
    padding: 11px 15px; color: var(--text);
    font-family: 'Epilogue', sans-serif; font-size: 0.875rem;
    outline: none; transition: all 0.2s;
  }
  #userInput:focus { border-color: rgba(245,158,11,0.5); box-shadow: 0 0 0 3px rgba(245,158,11,0.08); }
  #userInput::placeholder { color: var(--muted); font-size: 0.83rem; }

  .send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--amber), var(--gold));
    border: none; border-radius: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(245,158,11,0.35);
  }
  .send-btn:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(245,158,11,0.55); }
  .send-btn svg { width: 18px; height: 18px; fill: var(--bg); }

  /* Typing */
  .typing { display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.3s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

  /* ── ROUTE CARDS ── */
  .route-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .route-card {
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 14px; padding: 12px 15px;
    cursor: pointer; transition: all 0.22s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .route-card:hover {
    border-color: var(--amber); background: rgba(245,158,11,0.07);
    transform: translateX(4px);
    box-shadow: 0 4px 18px rgba(245,158,11,0.12);
  }
  .route-from-to {
    display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.88rem;
  }
  .route-arrow { color: var(--amber); font-size: 1rem; }
  .route-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .route-price {
    font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700;
    color: var(--amber);
  }
  .route-dur { font-size: 0.68rem; color: var(--muted); text-align: right; margin-top: 2px; }

  /* Seat selector */
  .seat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-top: 10px; max-width: 260px; }
  .seat {
    aspect-ratio: 1; border-radius: 8px; border: 1.5px solid var(--border2);
    background: var(--panel); cursor: pointer; font-size: 0.72rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--muted);
  }
  .seat.available:hover { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.1); transform: scale(1.08); }
  .seat.taken { background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.25); color: rgba(244,63,94,0.4); cursor: not-allowed; }
  .seat.selected { background: rgba(245,158,11,0.2); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 10px rgba(245,158,11,0.2); }
  .seat-legend { display: flex; gap: 12px; margin-top: 8px; font-size: 0.7rem; color: var(--muted); }
  .sl-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; }

  /* Inline form */
  .inline-input { display: flex; flex-direction: column; gap: 9px; margin-top: 10px; }
  .inline-field {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 11px; padding: 10px 14px; color: var(--text);
    font-family: 'Epilogue', sans-serif; font-size: 0.84rem;
    outline: none; width: 100%; transition: all 0.2s;
  }
  .inline-field:focus { border-color: rgba(245,158,11,0.5); box-shadow: 0 0 0 3px rgba(245,158,11,0.08); }
  .inline-field::placeholder { color: var(--muted); }
  select.inline-field { cursor: pointer; }
  select.inline-field option { background: var(--card); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .submit-book {
    background: linear-gradient(135deg, var(--amber), var(--gold));
    color: var(--bg); border: none; border-radius: 12px;
    padding: 13px; font-family: 'Epilogue', sans-serif;
    font-weight: 800; font-size: 0.9rem; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 18px rgba(245,158,11,0.3);
    letter-spacing: 0.01em;
  }
  .submit-book:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(245,158,11,0.45); filter: brightness(1.05); }

  /* Ticket card */
  .ticket {
    background: var(--panel);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 16px; overflow: hidden;
    margin-top: 10px;
  }
  .ticket-header {
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(251,191,36,0.08));
    padding: 12px 16px;
    border-bottom: 1px dashed rgba(245,158,11,0.2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ticket-title {
    font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700;
    color: var(--amber);
  }
  .ticket-ref {
    font-size: 0.68rem; color: var(--muted);
    font-family: monospace; letter-spacing: 0.08em;
  }
  .ticket-body { padding: 12px 16px; }
  .ticket-route {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border2);
  }
  .tr-city { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700; color: var(--text); }
  .tr-label { font-size: 0.66rem; color: var(--muted); margin-top: 1px; }
  .tr-arrow {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .tr-arrow svg { width: 60px; height: 16px; }
  .tr-dur { font-size: 0.65rem; color: var(--amber); font-weight: 600; }

  .ticket-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; font-size: 0.8rem;
    border-bottom: 1px dashed var(--border2);
  }
  .ticket-row:last-child { border: none; }
  .tk-key { color: var(--muted); }
  .tk-val { font-weight: 600; color: var(--text); }
  .tk-val.amber { color: var(--amber); }
  .tk-val.sky   { color: var(--sky); }

  .ticket-footer {
    background: rgba(245,158,11,0.05);
    padding: 10px 16px;
    border-top: 1px dashed rgba(245,158,11,0.2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ticket-total { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 900; color: var(--amber); }
  .ticket-total-label { font-size: 0.68rem; color: var(--muted); }

  /* WhatsApp btn */
  .wa-btn {
    display: flex; align-items: center; gap: 10px;
    background: var(--green); color: white;
    border: none; border-radius: 13px;
    padding: 14px 20px; font-family: 'Epilogue', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    cursor: pointer; margin-top: 11px; width: 100%;
    justify-content: center; transition: all 0.2s;
    text-decoration: none; box-shadow: 0 5px 18px rgba(37,211,102,0.28);
  }
  .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,0.42); }
  .wa-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

  .badge-strip { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .badge {
    background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.2);
    color: var(--amber); border-radius: 100px;
    padding: 4px 11px; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.02em;
  }

  .err { color: var(--rose); font-size: 0.76rem; margin-top: 5px; }

  .footer {
    margin-top: 10px; font-size: 0.7rem; color: var(--muted);
    text-align: center; position: relative; z-index: 2; letter-spacing: 0.03em;
  }
  .footer span { color: var(--amber); }

  /* Popular routes chips */
  .pop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 10px; }
  .pop-card {
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 12px; padding: 10px 12px;
    cursor: pointer; transition: all 0.22s; font-size: 0.8rem;
  }
  .pop-card:hover {
    border-color: var(--amber); background: rgba(245,158,11,0.07);
    transform: translateY(-2px); color: var(--amber);
  }
  .pop-card .pc-route { font-weight: 700; margin-bottom: 2px; }
  .pop-card .pc-meta  { font-size: 0.68rem; color: var(--muted); }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="road-bg"></div>

<div class="header">
  <div class="logo">🚌</div>
  <div class="header-text">
    <h1>Road<span>Link</span></h1>
    <p>Interstate Bus Ticket Booking</p>
    <div class="status-pill"><span class="status-dot"></span> BOOKING OPEN</div>
  </div>
</div>

<div class="chat-window">
  <div class="topbar">
    <div class="topbar-left">
      <div class="agent-av">🎫</div>
      <div class="agent-info">
        <strong>goMETRO Agent</strong>
        <span>Tickets · Seats · Schedules</span>
      </div>
    </div>
    <div class="step-dots" id="stepDots">
      <div class="step-dot" data-step="0"></div>
      <div class="step-dot" data-step="1"></div>
      <div class="step-dot" data-step="2"></div>
      <div class="step-dot" data-step="3"></div>
      <div class="step-dot" data-step="4"></div>
      <div class="step-dot" data-step="5"></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="chips" id="chips"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your origin, destination or response…" autocomplete="off"/>
    <button class="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="footer">[ <span>goMETRO</span> ] · Bookings confirmed via WhatsApp · Nigeria-wide coverage</div>

<script>
const WHATSAPP = "2348157505037";

// ── Routes database ────────────────────────────────────────────────────────
const ROUTES = [
  { from:"Abuja",    to:"Lagos",       price:7500,  duration:"7 hrs",  departures:["6:00 AM","8:00 AM","10:00 AM","2:00 PM","5:00 PM","9:00 PM"] },
  { from:"Lagos",    to:"Abuja",       price:7500,  duration:"7 hrs",  departures:["5:00 AM","7:00 AM","9:00 AM","12:00 PM","4:00 PM","8:00 PM"] },
  { from:"Abuja",    to:"Kano",        price:4500,  duration:"4 hrs",  departures:["7:00 AM","10:00 AM","1:00 PM","4:00 PM","7:00 PM"] },
  { from:"Lagos",    to:"Ibadan",      price:2500,  duration:"2 hrs",  departures:["6:00 AM","8:00 AM","10:00 AM","12:00 PM","2:00 PM","4:00 PM","6:00 PM"] },
  { from:"Lagos",    to:"Benin City",  price:5000,  duration:"4.5 hrs",departures:["6:00 AM","9:00 AM","12:00 PM","3:00 PM","6:00 PM","9:00 PM"] },
  { from:"Abuja",    to:"Port Harcourt",price:9500, duration:"8 hrs",  departures:["6:00 AM","8:00 AM","10:00 PM"] },
  { from:"Kano",     to:"Lagos",       price:11000, duration:"11 hrs", departures:["5:00 AM","7:00 PM"] },
  { from:"Lagos",    to:"Enugu",       price:8000,  duration:"7 hrs",  departures:["6:00 AM","9:00 AM","9:00 PM"] },
  { from:"Benin City","to":"Abuja",    price:6500,  duration:"5.5 hrs",departures:["6:00 AM","8:00 AM","10:00 AM","2:00 PM"] },
  { from:"Port Harcourt","to":"Lagos", price:9000,  duration:"8 hrs",  departures:["5:00 AM","7:00 AM","8:00 PM"] },
  { from:"Abuja",    to:"Ibadan",      price:7000,  duration:"6 hrs",  departures:["7:00 AM","10:00 AM","3:00 PM","9:00 PM"] },
  { from:"Lagos",    to:"Warri",       price:6500,  duration:"5 hrs",  departures:["6:00 AM","9:00 AM","12:00 PM","6:00 PM"] },
];

const POPULAR = [
  { from:"Abuja", to:"Lagos",      tag:"Most Popular" },
  { from:"Lagos", to:"Abuja",      tag:"High Demand" },
  { from:"Lagos", to:"Ibadan",     tag:"Quick Trip" },
  { from:"Lagos", to:"Benin City", tag:"Frequent" },
];

const NIGERIAN_CITIES = ["Abuja","Lagos","Kano","Ibadan","Benin City","Port Harcourt","Enugu","Warri","Owerri","Kaduna","Uyo","Calabar","Jos","Maiduguri","Sokoto"];

// Generate random seat availability (20 seats, some taken)
function genSeats() {
  const seats = {};
  for(let i=1;i<=20;i++){
    seats[i] = Math.random() > 0.3 ? "available" : "taken";
  }
  return seats;
}

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  step:       0,
  from:       "",
  to:         "",
  date:       "",
  departure:  "",
  route:      null,
  seats:      {},
  selectedSeat: null,
  passengers: 1,
  name:       "",
  phone:      "",
  gender:     "",
  pickupPoint:"",
};

const STEP_LABELS = ["Origin","Destination","Date","Departure","Seat","Passenger Info"];

// ── DOM ────────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const chipsEl    = document.getElementById("chips");
const inputEl    = document.getElementById("userInput");

function scrollBottom() { setTimeout(()=> messagesEl.scrollTop = messagesEl.scrollHeight, 80); }

function addMsg(who, html) {
  const w = document.createElement("div");
  w.className = `msg ${who}`;
  w.innerHTML = who==="bot"
    ? `<div class="bot-icon">🚌</div><div class="bubble">${html}</div>`
    : `<div class="bubble">${html}</div>`;
  messagesEl.appendChild(w); scrollBottom();
}

function showTyping() {
  const w = document.createElement("div");
  w.className="msg bot"; w.id="typing";
  w.innerHTML=`<div class="bot-icon">🚌</div><div class="bubble"><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
  messagesEl.appendChild(w); scrollBottom();
}
function removeTyping() { document.getElementById("typing")?.remove(); }

function setChips(arr) {
  chipsEl.innerHTML="";
  arr.forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=c;
    b.onclick=()=>processInput(c);
    chipsEl.appendChild(b);
  });
}

function updateStepDots() {
  document.querySelectorAll(".step-dot").forEach((d,i)=>{
    d.className = "step-dot" + (i<state.step?" done":i===state.step?" active":"");
  });
}

function botReply(html, chips=[], delay=900) {
  showTyping();
  setTimeout(()=>{ removeTyping(); addMsg("bot",html); setChips(chips); updateStepDots(); }, delay);
}

// ── Step 0: Origin ─────────────────────────────────────────────────────────
function askOrigin() {
  state.step = 0; updateStepDots();
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg("bot","Welcome to <strong>goMETRO</strong>! 🚌 Africa's smartest interstate bus booking agent.<br><br>Where are you <strong>travelling from</strong>? Pick a popular route or type your city:");
    renderPopularRoutes();
    setChips(NIGERIAN_CITIES.slice(0,6));
  }, 900);
}

function renderPopularRoutes() {
  const w = document.createElement("div");
  w.className="msg bot";
  const cards = POPULAR.map(r=>`
    <div class="pop-card" onclick="selectPopularRoute('${r.from}','${r.to}')">
      <div class="pc-route">🚌 ${r.from} → ${r.to}</div>
      <div class="pc-meta">⭐ ${r.tag}</div>
    </div>`).join("");
  w.innerHTML=`<div class="bot-icon">🚌</div>
    <div class="bubble" style="max-width:94%">
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px">🔥 Popular routes:</div>
      <div class="pop-grid">${cards}</div>
    </div>`;
  messagesEl.appendChild(w); scrollBottom();
}

function selectPopularRoute(from, to) {
  state.from = from; state.to = to;
  addMsg("user", `${from} → ${to}`);
  proceedToDate();
}

// ── Step 1-2: Route matching ───────────────────────────────────────────────
function findRoute(from, to) {
  return ROUTES.find(r=>
    r.from.toLowerCase()===from.toLowerCase() &&
    r.to.toLowerCase()===to.toLowerCase()
  );
}

function proceedToDate() {
  const route = findRoute(state.from, state.to);
  if (!route) {
    botReply(`Sorry, we don't currently serve the <strong>${state.from} → ${state.to}</strong> route directly. Try a different combination!`,
      NIGERIAN_CITIES.slice(0,6), 800);
    state.step = 0; state.from=""; state.to="";
    return;
  }
  state.route = route;
  state.step = 2;

  // Generate date options (today + next 6 days)
  const dates = [];
  for(let i=0;i<7;i++){
    const d = new Date(); d.setDate(d.getDate()+i);
    dates.push(d.toLocaleDateString("en-NG",{weekday:"short",day:"numeric",month:"short"}));
  }

  botReply(
    `✅ Route found! <strong>${state.from}</strong> → <strong>${state.to}</strong><br>
     <span class="hl">⏱ ${route.duration}</span> &nbsp;·&nbsp; 💰 <strong style="color:var(--amber)">₦${route.price.toLocaleString()}</strong> per seat<br><br>
     📅 What date are you travelling?`,
    dates
  );
}

// ── Step 3: Departure time ─────────────────────────────────────────────────
function showDepartures(date) {
  state.date = date; state.step = 3;
  botReply(
    `📅 <strong>${date}</strong> selected!<br><br>⏰ Choose your preferred <strong>departure time</strong>:`,
    state.route.departures
  );
}

// ── Step 4: Seat selection ─────────────────────────────────────────────────
function showSeatSelector(departure) {
  state.departure = departure; state.step = 4;
  state.seats = genSeats(); state.selectedSeat = null;

  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg("bot",`🕐 Departure: <strong>${departure}</strong> — Loading seat map for bus…`);
    renderSeatMap();
    updateStepDots();
  }, 900);
}

function renderSeatMap() {
  const w = document.createElement("div");
  w.className="msg bot";

  const seatCells = Object.entries(state.seats).map(([num, status])=>`
    <div class="seat ${status}" id="seat-${num}" onclick="selectSeat(${num},'${status}')">${num}</div>
  `).join("");

  w.innerHTML=`<div class="bot-icon">🚌</div>
    <div class="bubble" style="max-width:94%">
      <div style="margin-bottom:6px;font-size:0.82rem">🚌 <strong>Seat Map</strong> — Click to select your seat:</div>
      <div style="background:var(--panel);border-radius:10px;padding:10px;border-top:3px solid var(--amber);text-align:center;font-size:0.65rem;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em">DRIVER · FRONT</div>
      <div class="seat-grid">${seatCells}</div>
      <div class="seat-legend">
        <span><span class="sl-dot" style="background:var(--panel);border:1.5px solid rgba(255,255,255,0.15)"></span>Available</span>
        <span><span class="sl-dot" style="background:rgba(245,158,11,0.2);border:1.5px solid var(--amber)"></span>Selected</span>
        <span><span class="sl-dot" style="background:rgba(244,63,94,0.1);border:1.5px solid rgba(244,63,94,0.25)"></span>Taken</span>
      </div>
    </div>`;
  messagesEl.appendChild(w); scrollBottom();
}

function selectSeat(num, status) {
  if (status==="taken") return;

  // Deselect previous
  if (state.selectedSeat) {
    const prev = document.getElementById(`seat-${state.selectedSeat}`);
    if (prev) { prev.classList.remove("selected"); prev.classList.add("available"); }
  }

  state.selectedSeat = num;
  const el = document.getElementById(`seat-${num}`);
  if (el) { el.classList.remove("available"); el.classList.add("selected"); }

  // Remove old confirm chips and re-add
  chipsEl.innerHTML="";
  const b=document.createElement("button");
  b.className="chip"; b.textContent=`✅ Confirm Seat ${num}`;
  b.onclick=()=>processInput(`Seat ${num}`);
  chipsEl.appendChild(b);
}

// ── Step 5: Passenger info ─────────────────────────────────────────────────
function showPassengerForm() {
  state.step = 5;
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg("bot",`🎫 <strong>Seat ${state.selectedSeat}</strong> reserved! Almost done — fill in passenger details:`);
    renderPassengerForm();
    updateStepDots();
  }, 900);
}

function renderPassengerForm() {
  const today = new Date().toISOString().split("T")[0];
  const w = document.createElement("div");
  w.className="msg bot";
  w.innerHTML=`
    <div class="bot-icon">🚌</div>
    <div class="bubble" style="max-width:93%">
      <div class="inline-input" id="passengerForm">
        <input class="inline-field" id="f_name"  placeholder="Full name (as on ID) *" type="text"/>
        <div class="field-row">
          <input class="inline-field" id="f_phone" placeholder="Phone number *" type="tel"/>
          <select class="inline-field" id="f_gender">
            <option value="" disabled selected>Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Prefer not to say</option>
          </select>
        </div>
        <select class="inline-field" id="f_pickup">
          <option value="" disabled selected>Pickup point in ${state.from}</option>
          <option>Main Motor Park</option>
          <option>Central Bus Terminal</option>
          <option>Park & Ride Hub</option>
          <option>City Gate Terminal</option>
          <option>Hotel pickup (+₦500)</option>
        </select>
        <input class="inline-field" id="f_note" placeholder="Special needs / luggage info (optional)"/>
        <button class="submit-book" onclick="submitBooking()">🚌 Book My Ticket — ₦${state.route.price.toLocaleString()}</button>
      </div>
    </div>`;
  messagesEl.appendChild(w); scrollBottom();
}

// ── Submit booking ─────────────────────────────────────────────────────────
function submitBooking() {
  const name   = document.getElementById("f_name")?.value.trim();
  const phone  = document.getElementById("f_phone")?.value.trim();
  const gender = document.getElementById("f_gender")?.value;
  const pickup = document.getElementById("f_pickup")?.value;
  const note   = document.getElementById("f_note")?.value.trim() || "";

  if (!name || !phone) { flashErr("Please enter your full name and phone number."); return; }
  if (phone.length < 7) { flashErr("Enter a valid phone number."); return; }
  if (!pickup) { flashErr("Please select a pickup point."); return; }

  state.name=name; state.phone=phone; state.gender=gender||""; state.pickupPoint=pickup;

  document.getElementById("passengerForm").style.display="none";
  addMsg("user",`${name} · ${phone}`);
  showTyping();
  setTimeout(()=>{ removeTyping(); showTicket(note); }, 1300);
}

function flashErr(msg) {
  document.getElementById("err_p")?.remove();
  const el=document.createElement("div");
  el.id="err_p"; el.className="err"; el.textContent="⚠ "+msg;
  document.getElementById("passengerForm")?.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ── Ticket ─────────────────────────────────────────────────────────────────

              <svg viewBox="0 0 60 16" fill="none">
                <line x1="0" y1="8" x2="48" y2="8" stroke="rgba(245,158,11,0.4)" stroke-width="1.5" stroke-dasharray="4 3"/>
                <path d="M44 3L54 8L44 13" stroke="var(--amber)" stroke-width="1.5" fill="none"/>
              </svg>
              <div class="tr-dur">${route.duration}</div>
            </div>
            <div style="text-align:right">
              <div class="tr-city">${to}</div>
              <div class="tr-label" style="text-align:right">DESTINATION</div>
            </div>

          <div class="ticket-row"><span class="tk-key">📅 Travel Date</span><span class="tk-val">${date}</span></div>
          <div class="ticket-row"><span class="tk-key">⏰ Departure</span><span class="tk-val amber">${departure}</span></div>
          <div class="ticket-row"><span class="tk-key">💺 Seat</span><span class="tk-val amber">No. ${selectedSeat}</span></div>
          <div class="ticket-row"><span class="tk-key">🚏 Pickup Point</span><span class="tk-val sky">${pickupPoint}</span></div>
          <div class="ticket-row"><span class="tk-key">👤 Passenger</span><span class="tk-val">${name}</span></div>
          <div class="ticket-row"><span class="tk-key">📞 Phone</span><span class="tk-val">${phone}</span></div>
        </div>

// ── Core processor ─────────────────────────────────────────────────────────
function processInput(raw) {
  if (!raw.trim()) return;
  const v = raw.toLowerCase().trim();
  chipsEl.innerHTML="";

  if (v.includes("book another") || v.includes("new ticket") || v.includes("start over") || v.includes("home")) { resetChat(); return; }
  if (v.includes("help")) {
    addMsg("user",raw); showTyping();
    setTimeout(()=>{
      removeTyping();
      addMsg("bot",`Need help? 🚌<br><br>📞 <strong>+234 815 750 5037</strong><br>💬 WhatsApp for booking support<br><br>We cover <strong>12+ interstate routes</strong> across Nigeria including Abuja, Lagos, Kano, Port Harcourt, Benin City and more.<br><br>Type <em>Start Over</em> to make a new booking.`);
      setChips(["🔄 Book Another Ticket"]);
    },800);
    return;
  }

  addMsg("user", raw);

  // ── Routing by step ──
  if (state.step === 0) {
    // Select origin
    const city = NIGERIAN_CITIES.find(c=>v.includes(c.toLowerCase()));
    if (city) {
      state.from = city; state.step = 1;
      botReply(`📍 <strong>${city}</strong> — Great! Now where are you <strong>travelling to</strong>?`,
        NIGERIAN_CITIES.filter(c=>c!==city).slice(0,7));
    } else {
      botReply("Please pick a valid city from the list or type a major Nigerian city name.",
        NIGERIAN_CITIES.slice(0,6));
    }
    return;
  }

  if (state.step === 1) {
    // Select destination
    const city = NIGERIAN_CITIES.find(c=>v.includes(c.toLowerCase()));
    if (city && city!==state.from) {
      state.to = city;
      proceedToDate();
    } else if (city===state.from) {
      botReply("Origin and destination can't be the same. Pick a different city! 😄",
        NIGERIAN_CITIES.filter(c=>c!==state.from).slice(0,7));
    } else {
      botReply("Please pick a valid destination city.",
        NIGERIAN_CITIES.filter(c=>c!==state.from).slice(0,7));
    }
    return;
  }

  if (state.step === 2) {
    // Date selected
    showDepartures(raw);
    return;
  }

  if (state.step === 3) {
    // Departure time selected
    showSeatSelector(raw);
    return;
  }

  if (state.step === 4) {
    // Seat confirm
    if (v.includes("seat") && state.selectedSeat) {
      showPassengerForm();
    } else if (!state.selectedSeat) {
      addMsg("bot","Please select a seat from the map above first! 👆");
      setChips([]);
    }
    return;
  }

  // Fallback
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg("bot","Please follow the steps above or type <strong>Start Over</strong> to begin a new booking. 🚌");
  },700);
}

function handleSend() {
  const val=inputEl.value.trim();
  if(!val)return;
  inputEl.value="";
  processInput(val);
}
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter")handleSend();});

// ── Init ───────────────────────────────────────────────────────────────────
function resetChat() {
  Object.assign(state,{step:0,from:"",to:"",date:"",departure:"",route:null,seats:{},selectedSeat:null,passengers:1,name:"",phone:"",gender:"",pickupPoint:""});
  messagesEl.innerHTML=""; chipsEl.innerHTML="";
  initChat();
}

function initChat() {
  updateStepDots();
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const h = new Date().getHours();
    const g = h<12?"Good morning":h<17?"Good afternoon":"Good evening";
    addMsg("bot",
      `${g}! 🚌 Welcome to <strong>goMETRO</strong> — Nigeria's fastest interstate bus booking system.<br><br>Book tickets across <strong>12+ routes</strong> nationwide in under 2 minutes. Where are you travelling today?`
    );
    renderPopularRoutes();
    setChips(NIGERIAN_CITIES.slice(0,6));
  },900);
}

initChat();
</script>
